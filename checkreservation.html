<!DOCTYPE html>
<html>
<head>
    <title>PSWProject - My Reservations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Public/Assets/css/bootstrap.min.css">
</head>

<body class="bg-light">

    <div class="container py-5 col-9 mt-3">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-success">My Reservations</h2>
            <a href="dashboard.html" class="btn btn-outline-dark shadow-sm">Back to Dashboard</a>
        </div>

        <ul class="nav nav-tabs border-dark shadow-sm" id="customerTabs" role="tabpanel">
            <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#ongoing">Ongoing</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#upcoming">Upcoming</button></li>
            <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#history">History</button></li>
        </ul>

        <div class="tab-content bg-white p-4 border rounded-bottom shadow-sm" id="customerReservationContent">
            
            <div class="tab-pane fade show active" id="ongoing">
                <table class="table table-hover">
                    <thead class="table-success">
                        <tr><th>Date</th><th>Court</th><th>Session</th><th>Status</th></tr>
                    </thead>
                    <tbody id="customerOngoingTable">
                        </tbody>
                </table>
            </div>
        
            <div class="tab-pane fade" id="upcoming">
                <table class="table table-hover">
                    <thead class="table-primary">
                        <tr><th>Date</th><th>Court</th><th>Session</th><th>Status</th></tr>
                    </thead>
                    <tbody id="customerUpcomingTable">
                        </tbody>
                </table>
            </div>

            <div class="tab-pane fade" id="history">
                <table class="table table-hover">
                    <thead class="table-secondary">
                        <tr><th>Date</th><th>Court</th><th>Session</th><th>Status</th></tr>
                    </thead>
                    <tbody id="customerHistoryTable">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Ambil data khusus untuk user yang sedang login
            fetch('get_my_reservations.php')
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    renderCustomerTable('customerOngoingTable', data.ongoing);
                    renderCustomerTable('customerUpcomingTable', data.upcoming);
                    renderCustomerTable('customerHistoryTable', data.history);
                } else {
                    alert('Gagal memuat data: ' + data.message);
                }
            })
            .catch(error => console.error('Error fetching data:', error));
        });

        // Fungsi pembuat baris tabel
        function renderCustomerTable(tbodyId, dataArray) {
            const tbody = document.getElementById(tbodyId);
            tbody.innerHTML = ''; 

            if(dataArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted py-3">Tidak ada data</td></tr>';
                return;
            }

            dataArray.forEach(row => {
                let badgeColor = 'bg-secondary';
                if(row.status === 'Pending') badgeColor = 'bg-warning text-dark';
                if(row.status === 'Approved') badgeColor = 'bg-primary';
                if(row.status === 'Canceled') badgeColor = 'bg-danger';
                if(row.status === 'Finished') badgeColor = 'bg-success';

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${row.date}</td>
                    <td>${row.court}</td>
                    <td>${row.session}</td>
                    <td><span class="badge ${badgeColor}">${row.status}</span></td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
    <script src="Public/Assets/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>PSWProject</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Public/Assets/css/bootstrap.min.css">
</head> 

<body class="bg-light">
    <div class="d-flex min-vh-100 justify-content-center align-items-center">

        <div class="container">
            <div class="row mb-5">
                <div class="col-md-9 mx-auto">
                    <a href="dashboard.html" class="btn btn-outline-dark shadow-sm">&larr; Return to Dashboard?</a>
                </div>
            </div> 
            
            <div class="row mb-3">
                <div class="col-md-8 mx-auto">
                    <div class="card border-dark shadow-sm">
                        <div class="card-header bg-success text-white py-3">
                            <h4 class="mb-0 text">Court Reservation Form</h4>
                        </div>

                        <div class="card-body py-4">
                            <form id="bookingForm">
                                <div class="mb-3">
                                    <label for="courtSelect" class="form-label fw-bold">Choose Court</label>
                                    <select name="courtSelect" id="courtSelect" class="form-select" required>
                                        <option value="1">Court 1</option>
                                        <option value="2">Court 2</option>
                                        <option value="3">Court 3</option>
                                        <option value="4">Court 4</option>
                                        <option value="5">Court 5</option>
                                        <option value="6">Court 6</option>
                                        <option value="7">Court 7</option>
                                        <option value="8">Court 8</option>
                                    </select>
                                </div>

                                <hr>

                                <div class="mb-3 col-md-6">
                                    <label for="bookingDate" class="form-label fw-bold">Date</label>
                                    <input type="date" class="form-control" id="bookingDate" name="bookingDate" required>
                                </div>

                                <hr>

                                <div class="mb-3">
                                    <label for="bookingTime" class="form-label fw-bold d-block">Session</label>
                                    <div class="row g-2">
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box1" name="sesi[]" value="10-12" autocomplete="off">
                                            <label for="box1" class="btn btn-outline-success w-100">10:00-12:00</label>
                                        </div>
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box2" name="sesi[]" value="12-14" autocomplete="off">
                                            <label for="box2" class="btn btn-outline-success w-100">12:00-14:00</label>
                                        </div>
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box3" name="sesi[]" value="14-16" autocomplete="off">
                                            <label for="box3" class="btn btn-outline-success w-100">14:00-16:00</label>
                                        </div>
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box4" name="sesi[]" value="16-18" autocomplete="off">
                                            <label for="box4" class="btn btn-outline-success w-100">16:00-18:00</label>
                                        </div>
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box5" name="sesi[]" value="18-20" autocomplete="off">
                                            <label for="box5" class="btn btn-outline-success w-100">18:00-20:00</label>
                                        </div>
                                        <div class="col-4">
                                            <input type="checkbox" class="btn-check" id="box6" name="sesi[]" value="20-22" autocomplete="off">
                                            <label for="box6" class="btn btn-outline-success w-100">20:00-22:00</label>
                                        </div>
                                    </div>
                                </div>

                                <hr>

                                <div class="mb-3 bg-light p-3 rounded border">
                                    <h5 class="mb-0 d-flex justify-content-between align-items-center">
                                        <span>Total Harga:</span>
                                        <span class="text-success fw-bold" id="totalPriceDisplay">Rp 0</span>
                                    </h5>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-success btn-lg">Book Reservation</button>
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title">Reservasi Succeed!</h5>
                </div>
                <div class="modal-body">
                    <p>Terima kasih! Reservasi Anda untuk lapangan telah dicatat.</p>
                </div>
                <div class="modal-footer">
                    <a href="dashboard.html" class="btn btn-success">Return To Dashboard</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const dateInput = document.getElementById('bookingDate');
            const courtSelect = document.getElementById('courtSelect');
            const checkboxes = document.querySelectorAll('input[name="sesi[]"]');
            const priceDisplay = document.getElementById('totalPriceDisplay');
            const pricePerSession = 150000; 

            // 1. Fungsi Cek Ketersediaan Sesi
            function checkAvailability() {
                const dateVal = dateInput.value;
                const courtVal = courtSelect.value;

                // Reset semua checkbox (Buka kuncinya & nol-kan harga)
                checkboxes.forEach(cb => {
                    cb.disabled = false;
                    cb.checked = false;
                    cb.parentElement.classList.remove('text-muted', 'text-decoration-line-through'); 
                });
                priceDisplay.textContent = 'Rp 0';

                // Jika tanggal dan lapangan sudah dipilih, cek ke database
                if (dateVal && courtVal) {
                    fetch(`check_availability.php?date=${dateVal}&courtID=${courtVal}`)
                    .then(res => res.json())
                    .then(bookedSessions => {
                        // Loop semua checkbox
                        checkboxes.forEach(cb => {
                            // Jika value checkbox ini ada di daftar yang sudah dipesan, matikan!
                            if (bookedSessions.includes(cb.value)) {
                                cb.disabled = true;
                                // Tambahkan efek visual agar teksnya dicoret
                                cb.parentElement.classList.add('text-muted', 'text-decoration-line-through');
                            }
                        });
                    })
                    .catch(err => console.error('Error fetching availability:', err));
                }
            }

            // Pantau jika User mengganti Tanggal atau Lapangan, langsung cek ulang!
            dateInput.addEventListener('change', checkAvailability);
            courtSelect.addEventListener('change', checkAvailability);

            // 2. Kalkulator Harga Live
            checkboxes.forEach(box => {
                box.addEventListener('change', () => {
                    let count = document.querySelectorAll('input[name="sesi[]"]:checked').length;
                    let total = count * pricePerSession;
                    priceDisplay.textContent = 'Rp ' + total.toLocaleString('id-ID');
                });
            });

            // 3. Sistem Submit Booking (Tombol Book Reservation)
            document.getElementById('bookingForm').addEventListener('submit', function(e) {
                e.preventDefault(); 
                
                let checkedCount = document.querySelectorAll('input[name="sesi[]"]:checked').length;
                if(checkedCount === 0) {
                    alert('Silakan pilih minimal 1 sesi yang tersedia!');
                    return;
                }

                let formData = new FormData(this);

                fetch('booking_process.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if(data.status === 'success') {
                        alert('Booking Berhasil! Menunggu persetujuan Admin.');
                        // Tampilkan notifikasi modal jika ada, atau redirect
                        window.location.href = 'checkreservation.html'; // Langsung bawa ke history
                    } else {
                        alert('Gagal: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('System Error:', error);
                    alert('Terjadi kesalahan saat memproses booking.');
                });
            });
        });
    </script>
</body>
